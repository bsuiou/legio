<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Legio</title>
    <link rel="stylesheet" href="css/style.css?v=19">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
</head>
<body>
    <canvas id="gameCanvas"></canvas>

    <div id="mainMenu" class="overlay">
        <div class="menu-content">
            <h1>Legio</h1>
            <p class="subtitle">Command Your Legions</p>
            <button id="btnStart" class="menu-btn">Start Game</button>
            <button id="btnWatch" class="menu-btn">Watch Battle</button>
            <button id="btnCampaign" class="menu-btn">Campaign</button>
            <button id="btnEndless" class="menu-btn">Endless Campaign</button>
            <button id="btnMultiplayer" class="menu-btn">1v1 Multiplayer</button>
            <button id="btnModifiers" class="menu-btn small">Battle Modifiers</button>
        </div>
    </div>

    <div id="mapSelect" class="overlay hidden">
        <div class="menu-content">
            <h2>Select Battlefield</h2>
            <div class="map-grid">
                <div class="map-card selected" data-map="grasslands">
                    <img class="map-preview" src="assets/maps/grasslands.png" alt="The Grasslands">
                    <span>The Grasslands</span>
                </div>
                <div class="map-card" data-map="river">
                    <img class="map-preview" src="assets/maps/river.png" alt="River Crossing">
                    <span>River Crossing</span>
                </div>
                <div class="map-card" data-map="hillfort">
                    <img class="map-preview" src="assets/maps/hillfort.png" alt="King of the Hill">
                    <span>King of the Hill</span>
                </div>
                <div class="map-card" data-map="dense_forest">
                    <img class="map-preview" src="assets/maps/dense_forest.png" alt="Dense Forest">
                    <span>Dense Forest</span>
                </div>
                <div class="map-card" data-map="rolling_hills">
                    <img class="map-preview" src="assets/maps/rolling_hills.png" alt="Rolling Hills">
                    <span>Rolling Hills</span>
                </div>
                <div class="map-card" data-map="narrow_pass">
                    <img class="map-preview" src="assets/maps/narrow_pass.png" alt="Narrow Pass">
                    <span>Narrow Pass</span>
                </div>
                <div class="map-card" data-map="twin_rivers">
                    <img class="map-preview" src="assets/maps/twin_rivers.png" alt="Twin Rivers">
                    <span>Twin Rivers</span>
                </div>
                <div class="map-card" data-map="forest_river">
                    <img class="map-preview" src="assets/maps/forest_river.png" alt="Forest River">
                    <span>Forest River</span>
                </div>
                <div class="map-card" data-map="scattered_rocks">
                    <img class="map-preview" src="assets/maps/scattered_rocks.png" alt="Scattered Rocks">
                    <span>Scattered Rocks</span>
                </div>
                <div class="map-card" data-map="roman_road">
                    <img class="map-preview" src="assets/maps/roman_road.png" alt="Roman Road">
                    <span>Roman Road</span>
                </div>
                <div class="map-card" data-map="ambush">
                    <img class="map-preview" src="assets/maps/ambush.png" alt="Ambush">
                    <span>Ambush</span>
                </div>
            </div>
            <button id="btnBack" class="menu-btn small">Back</button>
        </div>
    </div>

    <div id="modifiersScreen" class="overlay hidden"></div>
    <div id="armySetup" class="overlay hidden"></div>
    <div id="placementUI" class="overlay-bar hidden"></div>
    <div id="battleUI" class="overlay-bar hidden"></div>
    <div id="resultScreen" class="overlay hidden"></div>
    <div id="campaignMap" class="overlay hidden"></div>
    <div id="endlessMap" class="overlay hidden"></div>
    <div id="spectatorSetup" class="overlay hidden"></div>
    <div id="multiplayerLobby" class="overlay hidden"></div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="js/map.js?v=14"></script>
    <script src="js/unit.js?v=20"></script>
    <script src="js/visibility.js?v=7"></script>
    <script src="js/combat.js?v=16"></script>
    <script src="js/ai.js?v=8"></script>
    <script src="js/army.js?v=18"></script>
    <script src="js/campaign.js?v=18"></script>
    <script src="js/endless.js?v=2"></script>
    <script src="js/renderer.js?v=22"></script>
    <script src="js/network.js?v=4"></script>
    <script src="js/input.js?v=12"></script>
    <script src="js/main.js?v=27"></script>
</body>
</html>
